name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24.15
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test -w server
      - run: npm test -w mobile -- --browsers=ChromeHeadless
