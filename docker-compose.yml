services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vision_assist
      POSTGRES_USER: vision_assist
      POSTGRES_PASSWORD: vision_assist
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vision_assist"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
