<ion-content [fullscreen]="true"><main class="page" *ngIf="result as r"><a routerLink="/scanner" class="back">←</a><div class="badge">{{r.confidence < .6 ? 'Identificación aproximada' : 'Objeto identificado'}}</div><h1>{{r.objectName}}</h1><p class="category">{{r.category}}</p><div class="confidence"><strong>{{r.confidence | percent:'1.0-0'}}</strong><span>de confianza</span></div><section *ngIf="r.brand || r.model"><label>Marca y modelo</label><p>{{r.brand || 'No determinada'}} <span *ngIf="r.model">· {{r.model}}</span></p></section><section><label>Descripción</label><p>{{r.description}}</p></section><section *ngIf="r.visibleText.length"><label>Texto visible</label><div class="chips"><span *ngFor="let text of r.visibleText">{{text}}</span></div></section><section class="warnings" *ngIf="r.warnings.length"><label>⚠ Advertencias</label><p *ngFor="let warning of r.warnings">{{warning}}</p></section><ion-button expand="block" routerLink="/scanner">Volver a escanear</ion-button><ion-button expand="block" fill="clear" color="medium">La identificación es incorrecta</ion-button></main></ion-content>
