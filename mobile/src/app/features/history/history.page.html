<ion-content [fullscreen]="true"><main><header><a routerLink="/scanner">←</a><div><h1>Historial</h1><p>Tus identificaciones recientes</p></div></header><p *ngIf="loading">Cargando...</p><p class="error" *ngIf="error">{{error}}</p><p class="empty" *ngIf="!loading && !items.length">Todavía no hay objetos analizados.</p><a class="item" *ngFor="let item of items" [routerLink]="['/result',item.id]"><div><strong>{{item.objectName}}</strong><span>{{item.category}} · {{item.createdAt | date:'short'}}</span></div><b>{{item.confidence | percent:'1.0-0'}}</b></a><nav *ngIf="totalPages>1"><ion-button fill="clear" (click)="previous()" [disabled]="page===1">Anterior</ion-button><span>{{page}} / {{totalPages}}</span><ion-button fill="clear" (click)="next()" [disabled]="page===totalPages">Siguiente</ion-button></nav></main></ion-content>
